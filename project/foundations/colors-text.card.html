<!-- @dsCard group="Colors" viewport="700x140" name="Text roles" subtitle="White-to-silver hierarchy on near-black" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--bg-base); display:grid; gap:14px; }
  .line { display:flex; align-items:baseline; gap:16px; }
  .t { font-family: var(--font-ui); font-weight: var(--fw-bold); font-size: 20px; width: 320px; }
  .meta { font: var(--fw-regular) 11px var(--font-mono); color: var(--text-tertiary); }
</style></head>
<body>
  <div class="line"><span class="t" style="color:var(--text-base)">Know before you go</span><span class="meta">text-base · #FFFFFF</span></div>
  <div class="line"><span class="t" style="color:var(--text-secondary)">Daily fishing reports</span><span class="meta">text-secondary · #A7B0B2</span></div>
  <div class="line"><span class="t" style="color:var(--text-tertiary)">Coverage expanding</span><span class="meta">text-tertiary · #6E7779</span></div>
  <div class="line"><span class="t" style="color:var(--text-disabled)">Disabled state</span><span class="meta">text-disabled · #565E60</span></div>
</body></html>
