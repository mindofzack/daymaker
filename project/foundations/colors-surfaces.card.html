<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Depth through shade — level 0 to 4" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .n { font: var(--fw-bold) 12px var(--font-ui); color: var(--text-base); }
  .h { font: var(--fw-regular) 11px var(--font-mono); color: var(--text-tertiary); margin-top: 2px; }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--bg-base)"></div><div class="meta"><div class="n">bg-base</div><div class="h">#0C0F11</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><div class="meta"><div class="n">surface-1</div><div class="h">#14181A</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="meta"><div class="n">surface-2</div><div class="h">#191E20</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><div class="meta"><div class="n">surface-3</div><div class="h">#222829</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-4)"></div><div class="meta"><div class="n">surface-4</div><div class="h">#2A3133</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-inset)"></div><div class="meta"><div class="n">inset</div><div class="h">#0A0D0E</div></div></div>
</div>
</body></html>
